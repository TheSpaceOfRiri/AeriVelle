<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register - AeriVelle</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Hanalei+Fill&family=Irish+Grover&family=Italianno&family=Jacques+Francois+Shadow&family=Combo&family=Imprima&display=swap" rel="stylesheet">
</head>
<body>
    <div class="global-overlay"></div> 

    <header>
        <div class="logo-container">
            <div class="diamond-logo"></div>
            <h1 class="logo-text">Aeri<span>Velle</span></h1>
        </div>
        <div class="nav-right-section">
            <nav>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="index.html#explore">Explore</a></li>
                    <li><a href="index.html#about">About</a></li>
                    <li><a href="login.html">Login</a></li>
                    <li><a href="register.html" class="active">Register</a></li> </ul>
            </nav>
            <button id="theme-toggle" class="theme-toggle" aria-label="Toggle dark mode">
                &#x263D; 
            </button>
        </div>
    </header>

    <main class="hero">
        <section class="hero-content">
            <h1 class="hero-title">REGISTER</h1>
            <form class="form-box">
                <input type="text" placeholder="Full Name" required style="display: block; width: 100%; margin-bottom: 10px; padding: 10px; border-radius: 20px; border: 1px solid var(--border-color); background: transparent; color: var(--text-color);">
                <input type="email" placeholder="Email" required style="display: block; width: 100%; margin-bottom: 10px; padding: 10px; border-radius: 20px; border: 1px solid var(--border-color); background: transparent; color: var(--text-color);">
                <input type="password" placeholder="Password" required style="display: block; width: 100%; margin-bottom: 20px; padding: 10px; border-radius: 20px; border: 1px solid var(--border-color); background: transparent; color: var(--text-color);">
                <button type="submit" class="btn btn-primary">Create Account</button>
            </form>
        </section>
    </main>

    <script>
        const themeToggleBtn = document.getElementById('theme-toggle');
        const body = document.body;
        themeToggleBtn.addEventListener('click', () => {
            body.classList.toggle('dark-mode');
        });
    </script>
</body>
</html>
